        let currentIndex = 0;
        let currentModule = 'sentence';
        let userStats = [];
        let userName = '';

        function startGame() {
            const nameInput = document.getElementById('user-name-input');
            userName = nameInput.value.trim();
            
            if (!userName) {
                nameInput.classList.add('border-red-500');
                anime({
                    targets: '#user-name-input',
                    translateX: [0, -10, 10, -10, 10, 0],
                    duration: 400,
                    easing: 'linear'
                });
                return;
            }

            document.getElementById('display-user-name').innerText = userName;
            
            // 切换界面
            anime({
                targets: '#welcome-screen',
                opacity: 0,
                translateY: -20,
                duration: 500,
                easing: 'easeInExpo',
                complete: () =&gt; {
                    document.getElementById('welcome-screen').classList.add('hidden');
                    const gameApp = document.getElementById('game-app');
                    gameApp.classList.remove('hidden');
                    gameApp.classList.add('flex');
                    
                    anime({
                        targets: '#game-app',
                        opacity: [0, 1],
                        translateY: [20, 0],
                        duration: 800,
                        easing: 'easeOutExpo'
                    });
                    
                    loadCurrentTask();
                }
            });
        }

        function switchModule(module) {
            currentModule = module;
            document.getElementById('module-order').classList.toggle('hidden', module !== 'order');
            document.getElementById('module-sentence').classList.toggle('hidden', module !== 'sentence');
            document.getElementById('btn-order').className = module === 'order' ? 'px-6 py-2 rounded-full btn-primary' : 'px-6 py-2 rounded-full bg-gray-200 text-gray-600';
            document.getElementById('btn-sentence').className = module === 'sentence' ? 'px-6 py-2 rounded-full btn-primary' : 'px-6 py-2 rounded-full bg-gray-200 text-gray-600';
            hideFeedback();
            loadCurrentTask();
        }

        function loadCurrentTask() {
            const data = wordsData[currentIndex];
            const moduleName = currentModule === 'sentence' ? '造句' : '连词成句';
            
            const scoreDisplay = document.getElementById('score-display');
            if (scoreDisplay) {
                scoreDisplay.innerHTML = `进度: &lt;span class=&quot;font-bold text-[var(--primary)]&quot;&gt;${moduleName}&lt;/span&gt; ${currentIndex + 1}/10`;
            }

            document.getElementById('btn-prev-order').disabled = currentIndex === 0;
            document.getElementById('btn-prev-sentence').disabled = currentIndex === 0;
            document.getElementById('btn-next-order').classList.add('hidden');
            document.getElementById('btn-next-sentence').classList.add('hidden');
            document.getElementById('btn-submit-order').classList.remove('hidden');
            document.getElementById('btn-submit-sentence').classList.remove('hidden');

            if (currentModule === 'order') {
                const pool = document.getElementById('word-pool');
                const zone = document.getElementById('answer-zone');
                pool.innerHTML = '';
                zone.innerHTML = '';
                document.getElementById('target-sentence-hint').innerText = `目标词: ${data.word} (${data.pinyin})`;
                document.getElementById('order-hint-box').classList.add('hidden');
                
                const shuffled = [...data.orderQuiz.words].sort(() =&gt; Math.random() - 0.5);
                shuffled.forEach(word =&gt; {
                    const tag = document.createElement('div');
                    tag.className = 'word-tag';
                    tag.innerText = word;
                    tag.addEventListener('click', () =&gt; moveWord(tag));
                    pool.appendChild(tag);
                });
            } else {
                document.getElementById('target-word').innerText = data.word;
                document.getElementById('target-pinyin').innerText = `(${data.pinyin})`;
                document.getElementById('target-meaning').innerText = data.meaning;
                const list = document.getElementById('example-list');
                list.innerHTML = data.examples.map((ex, i) =&gt; `&lt;li&gt;${ex} &lt;span class=&quot;text-xs text-gray-400 block&quot;&gt;${data.translations[i]}&lt;/span&gt;&lt;/li&gt;`).join('');
                document.getElementById('user-sentence').value = '';
            }
        }

        function prevTask() {
            if (currentIndex &gt; 0) {
                currentIndex--;
                loadCurrentTask();
                hideFeedback();
            }
        }

        function nextTask() {
            if (currentModule === 'sentence') {
                if (currentIndex &lt; 9) {
                    currentIndex++;
                    loadCurrentTask();
                    hideFeedback();
                } else {
                    currentIndex = 0;
                    switchModule('order');
                }
            } else {
                if (currentIndex &lt; 9) {
                    currentIndex++;
                    loadCurrentTask();
                    hideFeedback();
                } else {
                    showReport();
                }
            }
        }

        function playAudio() {
            const data = wordsData[currentIndex];
            if (data &amp;&amp; data.audio) {
                const audio = new Audio(data.audio);
                audio.play().catch(e =&gt; console.log(&quot;Audio play failed:&quot;, e));
            }
        }

        function resetOrder() {
            loadCurrentTask();
        }

        function checkOrder() {
            const zone = document.getElementById('answer-zone');

                }

        function checkSentence() {
            const input = document.getElementById('user-sentence').value.trim();
            const data = wordsData[currentIndex];
            const target = data.word;
            
            if (!input) {
                showFeedback(false, { commentZh: &quot;请输入你的句子哦！&quot;, commentEn: &quot;Please enter your sentence!&quot; });
                return;
            }

            // 第一步：预处理 (Preprocessing) - 查重与基础校验
            const cleanInput = input.replace(/[。？！，.?!,]/g, '');
            if (data.examples.some(ex =&gt; ex.replace(/[。？！，.?!,]/g, '') === cleanInput)) {
                showFeedback(false, { 
                    status: 'warning',
                    errorType: 'Originality',
                    commentZh: &quot;❌ 请不要重复已给的例子哦，试着造一个属于你自己的句子吧！&quot;,
                    commentEn: &quot;Please don't repeat the given examples. Try to make your own sentence!&quot;,
                    suggestion: &quot;尝试改变主语或场景，例如把&ldquo;我&rdquo;换成&ldquo;朋友&rdquo;。&quot;,
                    learningPoint: &quot;原创练习能更好地帮助你内化语法规则。&quot;
                });
                return;
            }

            if (!input.includes(target)) {
                showFeedback(false, {
                    status: 'error',
                    errorType: 'Missing Word',
                    commentZh: &quot;⚠️ 哎呀，还没用到目标词呢！&quot;,
                    commentEn: &quot;Oops, you haven't used the target word yet!&quot;,
                    suggestion: `请确保句中包含「${target}」。`,
                    learningPoint: data.missingWordTip
                });
                return;
            }

            // 第二步：分层校验 (Layered Validation)
            const result = validateSentence(input, target, data);
            
            if (result.score &gt;= 60) {
                showFeedback(true, result);
                userStats[currentIndex] = { word: target, module: 'sentence', correct: true, score: result.score };
                document.getElementById('btn-submit-sentence').classList.add('hidden');
                const nextBtn = document.getElementById('btn-next-sentence');
                nextBtn.classList.remove('hidden');
                nextBtn.innerText = currentIndex === 9 ? '完成所有造句，进入连词成句' : '下一题 (造句)';
            } else {
                showFeedback(false, result);
                userStats[currentIndex] = { word: target, module: 'sentence', correct: false, score: result.score };
            }
        }

        // 辅助词库：用于模拟词性标注
        const PRONOUNS = ['我', '你', '他', '她', '它', '我们', '你们', '他们', '她们', '大家', '谁'];
        const NOUNS = ['老师', '妈妈', '爸爸', '朋友', '医生', '老板', '学生', '公司', '学校', '家', '北京', '上海', '中国', '作业', '衣服', '饭', '电影', '书', '手机', '电脑', '电池', '东西', '地方'];
        const VERBS = ['在', '去', '吃', '喝', '看', '听', '说', '写', '做', '学', '买', '卖', '走', '来', '到', '住', '生活', '工作', '学习', '休息', '参加', '换', '想', '喜欢', '觉得', '知道', '认识', '习惯', '照顾', '谈谈', '复习', '听说', '到', '逛街', '早起', '找', '拿', '放'];
        const ADJS = ['忙', '累', '好', '棒', '甜', '辣', '漂亮', '帅', '高', '大', '小', '多', '少', '远', '近', '熟悉', '感动', '有空', '空', '舒服', '开心', '难过'];

        function validateSentence(input, target, data) {
            let result = {
                score: 100,
                status: 'success',
                errorType: 'None',
                commentZh: '太棒了！这个句子非常自然，用法完全正确👍',
                commentEn: 'Great! This sentence is very natural and the usage is perfectly correct.',
                suggestion: '你可以尝试加入更多细节，让句子更丰富。',
                learningPoint: data.usageNote,
                correctStructure: &quot;&quot;
            };

            // 1. 核心骨架检查 (Skeleton Check / Predicate Check)
            const hasVerb = VERBS.some(v =&gt; input.includes(v));
            const hasAdj = ADJS.some(a =&gt; input.includes(a));
            
            // 判定逻辑：
            // 1. 包含动词 (Verb exists)
            // 2. 包含形容词谓语 (Adjective as predicate, e.g., 我很好, 你好帅)
            // 3. 特例：习惯作为名词 (Habit as a noun)
            const hasPredicate = hasVerb || hasAdj;

            if (!hasPredicate) {
                result.score = 30;
                result.status = 'error';
                result.errorType = 'Structure Missing';
                result.commentZh = &quot;❌ 判定结果：结构缺失 (Structure Missing)&quot;;
                result.commentEn = &quot;💡 错误原因：句子中缺少核心动作（动词）或状态描述（形容词）。&quot;;
                result.correctStructure = &quot;💡 Correct Structure: 主语 + 动作/形容词 + 目标词&quot;;
                result.suggestion = &quot;✅ 建议修改：请在句中加入一个动作（如：去）或形容词（如：好、忙）。&quot;;
                return result;
            }

            // 2. 词性邻接与语序校验 (POS Adjacency &amp; Word Order)
            let grammarError = &quot;&quot;;
            let errorReasonEn = &quot;&quot;;
            let correctStructure = &quot;&quot;;
            const targetIndex = input.indexOf(target);
            const afterTarget = input.substring(targetIndex + target.length).trim();
            const beforeTarget = input.substring(0, targetIndex).trim();

            // 非法邻接表 (Illegal Adjacency)
            const isAdv = ['刚', '得', '好好儿'].includes(target);
            const nextIsPron = PRONOUNS.some(p =&gt; afterTarget.startsWith(p));
            const nextIsNoun = NOUNS.some(n =&gt; afterTarget.startsWith(n));

            switch(target) {
                case '好':
                    if (input.includes('我是好')) {
                        grammarError = &quot;不能直接用&ldquo;是+好&rdquo;。&quot;;
                        errorReasonEn = &quot;Direct translation of 'I am good' as '我是好' is incorrect in Chinese.&quot;;
                        correctStructure = &quot;Subject + 很 + 好 (e.g., 我很好)&quot;;
                    } else if (NOUNS.some(n =&gt; afterTarget.startsWith(n)) &amp;&amp; !VERBS.some(v =&gt; afterTarget.includes(v))) {
                        grammarError = &quot;「好」不能直接修饰名词（如：不能说&ldquo;好学生&rdquo;）。&quot;;
                        errorReasonEn = &quot;'好' cannot directly modify a noun without a measure word or being part of a predicate.&quot;;
                        correctStructure = &quot;好 + 形容词 (e.g., 好忙) 或 好 + 个 + 名词&quot;;
                    } else if (ADJS.some(a =&gt; afterTarget.includes(a)) &amp;&amp; !hasVerb) {
                        // 识别 [主语 + 好 + 形容词] (如：你好帅)
                        result.commentZh = &quot;✅ 判定结果：正确 (Correct)&quot;;
                        result.commentEn = &quot;💡 &ldquo;好&rdquo;在这里表示&ldquo;非常 (very)&rdquo;。在中文里，主语 + 好 + 形容词 是一个完整的句子，不需要额外加动词。&quot;;
                        result.suggestion = &quot;💡 地道建议：你的句子造得非常地道！&quot;;
                    } else if (input.includes('很好') || input.includes('挺好')) {
                        // 识别 [我很好]
                        result.commentZh = &quot;✅ 判定结果：正确 (Correct)&quot;;
                        result.commentEn = &quot;💡 这是一个非常标准的形容词谓语句。&quot;;
                        result.suggestion = &quot;💡 建议：继续保持这种简洁地道的表达。&quot;;
                    }
                    break;
                case '刚':
                    if (nextIsPron || nextIsNoun) {
                        grammarError = &quot;&ldquo;刚&rdquo;是副词，必须放在主语后面，不能放在主语前。&quot;;
                        errorReasonEn = &quot;The adverb '刚' must be placed after the subject, not before it.&quot;;
                        correctStructure = &quot;主语 + 刚 + 动词 (e.g., 我刚来)&quot;;
                    } else if (input.replace(/[。？！，.?!,]/g, '').endsWith('刚')) {
                        grammarError = &quot;&ldquo;刚&rdquo;不能放在句末。&quot;;
                        errorReasonEn = &quot;'刚' cannot be placed at the end of a sentence.&quot;;
                        correctStructure = &quot;主语 + 刚 + 动词&quot;;
                    }
                    break;
                case '哪儿':
                    const isUniversal = input.includes('都') || input.includes('也');
                    const isInterrogative = input.replace(/[。？！，.?!,]/g, '').endsWith('哪儿') || input.includes('？') || input.includes('?') || input.includes('呢');
                    
                    if (isUniversal) {
                        const specificPlaces = ['北京', '上海', '中国', '学校', '超市', '公司', '家'];
                        if (specificPlaces.some(p =&gt; input.includes(p))) {
                            grammarError = &quot;&ldquo;哪儿都&rdquo;表示任何地方，不能再出现具体的地点。&quot;;
                            errorReasonEn = &quot;'哪儿都' means 'anywhere', so specific place names are redundant and incorrect.&quot;;
                            correctStructure = &quot;主语 + 哪儿 + 都 + 动词 (e.g., 我哪儿都想去)&quot;;
                        }
                    } else if (!isInterrogative) {
                        grammarError = &quot;疑问代词&ldquo;哪儿&rdquo;在非倒装语境下不能放在句首。&quot;;
                        errorReasonEn = &quot;The interrogative pronoun '哪儿' usually comes after the verb or at the end.&quot;;
                        correctStructure = &quot;Subject + Verb + 哪儿? (e.g., 你在哪儿？)&quot;;
                    }
                    break;
                case '好好儿':
                    if (afterTarget === &quot;&quot; || (!VERBS.some(v =&gt; afterTarget.includes(v)) &amp;&amp; !ADJS.some(a =&gt; afterTarget.includes(a)))) {
                        grammarError = &quot;&ldquo;好好儿&rdquo;是修饰动作的，后面必须接一个动作。&quot;;
                        errorReasonEn = &quot;'好好儿' is an adverbial modifier and must be followed by a verb.&quot;;
                        correctStructure = &quot;好好儿 + (地) + 动词 (e.g., 好好儿学习)&quot;;
                    } else if (beforeTarget === &quot;&quot; &amp;&amp; nextIsPron) {
                        grammarError = &quot;&ldquo;好好儿&rdquo;不能放在主语前。&quot;;
                        errorReasonEn = &quot;'好好儿' must be placed after the subject.&quot;;
                        correctStructure = &quot;主语 + 好好儿 + 动词&quot;;
                    }
                    break;
                case '的话':
                    if (beforeTarget === &quot;&quot;) {
                        grammarError = &quot;&ldquo;的话&rdquo;表示假设，必须放在前半句的末尾。&quot;;
                        errorReasonEn = &quot;'的话' indicates a hypothesis and must be placed at the end of the 'if' clause.&quot;;
                        correctStructure = &quot;[分句] + 的话, + [结果]&quot;;
                    }
                    break;
                case '得':
                    if (nextIsNoun &amp;&amp; !VERBS.some(v =&gt; afterTarget.includes(v))) {
                        grammarError = &quot;&ldquo;得&rdquo;在这里表示&ldquo;必须&rdquo;，后面要接动作，不能直接接东西。&quot;;
                        errorReasonEn = &quot;'得 (děi)' means 'must' and must be followed by a verb, not a noun.&quot;;
                        correctStructure = &quot;主语 + 得 + 动词 (e.g., 我得去)&quot;;
                    }
                    break;
                case '让':
                case '陪':
                    const hasObject = PRONOUNS.some(p =&gt; afterTarget.startsWith(p)) || NOUNS.some(n =&gt; afterTarget.startsWith(n));
                    if (!hasObject) {
                        grammarError = `&ldquo;${target}&rdquo;后面必须有一个&ldquo;人&rdquo;（对象），不能直接接动作。`;
                        errorReasonEn = `The word '${target}' requires an object (person) before the following action.`;
                        correctStructure = `A + ${target} + B + 动作 (e.g., 我${target}你去)`;
                    } else if (target === '陪') {
                        // 检查 A 陪 B 还是 B 陪 A (简单逻辑：主语通常在陪之前)
                        if (beforeTarget === &quot;&quot;) {
                            grammarError = &quot;&ldquo;陪&rdquo;的结构通常需要一个发起动作的主语。&quot;;
                            errorReasonEn = &quot;'陪' usually needs a subject to initiate the action.&quot;;
                            correctStructure = &quot;A + 陪 + B + 动作&quot;;
                        }
                    }
                    break;
                case '习惯':
                    if (ADJS.some(a =&gt; afterTarget.startsWith(a)) &amp;&amp; !VERBS.some(v =&gt; afterTarget.includes(v))) {
                        grammarError = &quot;&ldquo;习惯&rdquo;后面不能直接接形容词。&quot;;
                        errorReasonEn = &quot;'习惯' cannot be directly followed by an adjective.&quot;;
                        correctStructure = &quot;习惯 + 动词/名词 (e.g., 习惯吃辣)&quot;;
                    }
                    break;
                case '后来':
                    const futureWords = ['明天', '下周', '以后', '然后', '将来', '下个月'];
                    if (futureWords.some(w =&gt; input.includes(w))) {
                        grammarError = &quot;&ldquo;后来&rdquo;只能讲过去发生的事。&quot;;
                        errorReasonEn = &quot;'后来' is used only for past events. For future events, use '然后'.&quot;;
                        correctStructure = &quot;过去的事, 后来... (e.g., 他先去了北京，后来去了上海)&quot;;
                    }
                    break;
            }

            // 拦截非法邻接 (POS Adjacency Check)
            if (!grammarError &amp;&amp; isAdv &amp;&amp; nextIsPron) {
                grammarError = `语序错误：副词「${target}」不能直接放在代词前面。`;
                errorReasonEn = `Adverbs like '${target}' cannot be placed before the subject pronoun.`;
                correctStructure = `主语 + ${target} + 动词`;
            }

            if (grammarError) {
                result.score = 40;
                result.status = 'error';
                result.errorType = 'Grammar Logic Error';
                result.commentZh = `❌ 判定结果：语法逻辑错误 (Grammar Logic Error)`;
                result.commentEn = `💡 错误原因：${grammarError} ${errorReasonEn}`;
                result.correctStructure = `💡 Correct Structure: ${correctStructure}`;
                result.suggestion = `✅ 建议修改：请参考例句&ldquo;${data.examples[0]}&rdquo;调整语序。`;
                return result;
            }

            // 3. 地道度建议 (Naturalness)
            if (target === '好' &amp;&amp; ADJS.some(a =&gt; afterTarget.startsWith(a))) {
                result.suggestion = &quot;💡 地道表达：在口语中，常用&ldquo;挺...的&rdquo;代替&ldquo;好...&rdquo;，例如&ldquo;挺忙的&rdquo;。&quot;;
            } else if (target === '刚' &amp;&amp; input.includes('了')) {
                result.score = 85;
                result.status = 'warning';
                result.commentZh = &quot;⚠️ 表达建议：&lsquo;刚&rsquo;表示动作刚刚发生，建议去掉句末的&lsquo;了&rsquo;。&quot;;
                result.commentEn = &quot;Naturalness: '刚' usually doesn't pair with '了'.&quot;;
                result.suggestion = &quot;建议：我刚吃饭 (More natural).&quot;;
            }

            return result;
        }

        function hideFeedback() {
            document.getElementById('feedback-area').classList.add('hidden');

        function moveWord(tag) {
            const pool = document.getElementById('word-pool');
            const zone = document.getElementById('answer-zone');
            if (!pool || !zone || !tag) return;
            if (tag.parentElement === pool) {
                zone.appendChild(tag);
            } else {
                pool.appendChild(tag);
            }
        }

        function showReport() {
            const sentenceStats = userStats.slice(0, 10);
            const orderStats = userStats.slice(10, 20);
            
            const sentenceScore = sentenceStats.filter(s =&gt; s &amp;&amp; s.correct).length;
            const orderScore = orderStats.filter(s =&gt; s &amp;&amp; s.correct).length;
            const totalScore = sentenceScore + orderScore;

            // 计算本课之星 (Star Word) - 造句得分最高的词
            const starItem = [...sentenceStats].filter(s =&gt; s &amp;&amp; s.score).sort((a, b) =&gt; b.score - a.score)[0];
            const starWord = starItem ? starItem.word : '无 (None)';

            // 计算挑战词汇 (Challenge Word) - 错误次数最多的词
            const wordErrorCounts = {};
            userStats.forEach(s =&gt; {
                if (s &amp;&amp; !s.correct) {
                    wordErrorCounts[s.word] = (wordErrorCounts[s.word] || 0) + 1;
                }
            });
            const challengeWord = Object.keys(wordErrorCounts).sort((a, b) =&gt; wordErrorCounts[b] - wordErrorCounts[a])[0] || '无 (None)';
            
            // 动态鼓励话语
            let encouragement = '太棒了，没有挑战！';
            if (challengeWord !== '无 (None)') {
                const data = wordsData.find(w =&gt; w.word === challengeWord);
                encouragement = `别担心，记得${data.feedback.error.reminder.split('。')[0]}就行了！&lt;br&gt;Don't worry, just remember ${data.feedback.error.reminder.split('.')[0]}!`;
            }

            // 筛选错题记录
            const incorrectItems = userStats.filter(s =&gt; s &amp;&amp; !s.correct);

            let reviewHtml = '';

                            需要复习的词汇 Review Detail
                        &lt;/h3&gt;
                        &lt;div class=&quot;space-y-6&quot;&gt;
                            ${incorrectItems.map(item =&gt; {
                                const data = wordsData.find(w =&gt; w.word === item.word);
                                const moduleLabel = item.module === 'sentence' ? '造句 Sentence' : '排序 Order';
                                const score = item.score || 0;
                                const feedback = item.module === 'sentence' ? data.feedback.error : {
                                    diagnosis: `语序不正确。'${data.word}' 的位置需要调整。`,
                                    fix: `正确语序：${data.orderQuiz.answer}`,
                                    reminder: data.feedback.error.reminder
                                };

                                return `
                                    &lt;div class=&quot;p-6 bg-red-50 border-l-4 border-red-500 rounded-r-xl shadow-sm&quot;&gt;
                                        &lt;div class=&quot;flex justify-between items-center mb-4&quot;&gt;
                                            &lt;div class=&quot;flex items-center gap-3&quot;&gt;
                                                &lt;span class=&quot;text-2xl font-bold text-red-800&quot;&gt;${data.word}&lt;/span&gt;
                                                &lt;span class=&quot;text-sm text-gray-500&quot;&gt;(${data.pinyin})&lt;/span&gt;
                                            &lt;/div&gt;
                                            &lt;div class=&quot;flex gap-2&quot;&gt;
                                                &lt;span class=&quot;text-xs px-3 py-1 bg-white text-red-600 rounded-full border border-red-200 font-bold&quot;&gt;${moduleLabel}&lt;/span&gt;
                                                &lt;span class=&quot;text-xs px-3 py-1 bg-red-600 text-white rounded-full font-bold&quot;&gt;得分: ${score}&lt;/span&gt;
                                            &lt;/div&gt;
                                        &lt;/div&gt;
                                        
                                        &lt;div class=&quot;space-y-4&quot;&gt;
                                            &lt;div class=&quot;bg-white/60 p-4 rounded-lg&quot;&gt;
                                                &lt;p class=&quot;text-sm font-bold text-red-700 mb-1&quot;&gt;❌ 详细反馈 (Detailed Feedback):&lt;/p&gt;
                                                &lt;p class=&quot;text-sm text-gray-800 leading-relaxed mb-2&quot;&gt;&lt;strong&gt;中文：&lt;/strong&gt;${feedback.diagnosis}&lt;/p&gt;
                                                &lt;p class=&quot;text-sm text-gray-600 italic leading-relaxed&quot;&gt;&lt;strong&gt;English:&lt;/strong&gt; ${data.usageNoteEn}&lt;/p&gt;
                                            &lt;/div&gt;
                                            
                                            &lt;div class=&quot;bg-green-50/50 p-4 rounded-lg border border-green-100&quot;&gt;
                                                &lt;p class=&quot;text-sm font-bold text-green-700 mb-1&quot;&gt;✅ 建议修改 (Suggestion):&lt;/p&gt;
                                                &lt;p class=&quot;text-sm text-gray-800&quot;&gt;${item.module === 'sentence' ? data.examples[0] : data.orderQuiz.answer}&lt;/p&gt;
                                                &lt;p class=&quot;text-xs text-gray-500 mt-1&quot;&gt;${item.module === 'sentence' ? data.translations[0] : data.orderQuiz.english}&lt;/p&gt;
                                            &lt;/div&gt;

                                            &lt;div class=&quot;flex items-start gap-2 text-blue-700&quot;&gt;
                                                &lt;svg class=&quot;w-5 h-5 mt-0.5 flex-shrink-0&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                                                &lt;p class=&quot;text-xs font-medium italic&quot;&gt;${feedback.reminder}&lt;/p&gt;
                                            &lt;/div&gt;
                                        &lt;/div&gt;
                                    &lt;/div&gt;
                                `;
                            }).join('')}
                        &lt;/div&gt;
                    &lt;/div&gt;
                `;

            const main = document.querySelector('main');
            main.innerHTML = `

                            &lt;p class=&quot;text-gray-500 text-sm mb-1&quot;&gt;总分 Total Score&lt;/p&gt;
                            &lt;p class=&quot;text-4xl font-bold text-blue-600&quot;&gt;${totalScore}/20&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;p-6 bg-yellow-50 rounded-2xl border border-yellow-100&quot;&gt;
                            &lt;p class=&quot;text-gray-500 text-sm mb-1&quot;&gt;🌟 本课之星 Star Word&lt;/p&gt;

                        &lt;div class=&quot;p-6 bg-red-50 rounded-2xl border border-red-100&quot;&gt;

                    ${reviewHtml}

                    &lt;div class=&quot;text-left mb-10 p-6 bg-gray-50 rounded-2xl&quot;&gt;
                        &lt;h3 class=&quot;font-bold text-lg mb-3 flex items-center gap-2&quot;&gt;
                            &lt;svg class=&quot;w-5 h-5 text-gray-600&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; viewBox=&quot;0 0 24 24&quot;&gt;&lt;path stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot; stroke-width=&quot;2&quot; d=&quot;M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z&quot;&gt;&lt;/path&gt;&lt;/svg&gt;
                            总体建议 Overall Suggestions:
                        &lt;/h3&gt;
                        &lt;div class=&quot;space-y-3&quot;&gt;
                            ${totalScore &gt;= 18 ? 
                                '&lt;p class=&quot;text-green-800 font-medium&quot;&gt;🌟 太棒了！你已经掌握了这些核心词汇。Excellent! You have mastered these core words.&lt;/p&gt;' :
                                '&lt;p class=&quot;text-gray-700&quot;&gt;📚 建议针对上方列出的错题进行重点复习。Keep practicing the words listed above to strengthen your grammar foundation.&lt;/p&gt;'
                            }

                    &lt;button onclick=&quot;location.reload()&quot; class=&quot;px-10 py-4 btn-primary rounded-xl font-bold text-lg shadow-lg&quot;&gt;重新开始 Restart&lt;/button&gt;
                &lt;/div&gt;
            `;
            
            const scoreDisplay = document.getElementById('score-display');
            if (scoreDisplay) scoreDisplay.classList.add('hidden');
            hideFeedback();
        }

        // 初始化
        // loadCurrentTask(); // 改为在 startGame 中调用

        // 将核心函数挂载到 window 对象，确保 HTML 中的 onclick 能够正常调用

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    //      * 点击 HTML 任何部分的埋点
    //      */
    //     function trackHtmlClick(event) {

    /**
     * 点击飞象老师 Logo 的埋点

      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}

        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);

  </script>
